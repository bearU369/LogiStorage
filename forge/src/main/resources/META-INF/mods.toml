modLoader="javafml"
loaderVersion="[4,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="icon.png"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forgeVersionRange}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${mcVersionRange}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="computercraft"
    mandatory=false
    versionRange="${ccVersionRange}"
    ordering="AFTER"

[[dependencies.${mod_id}]]
    modId="ae2"
    mandatory=false
    versionRange="${ae2VersionRange}"
    ordering="AFTER"

[[dependencies.${mod_id}]]
    modId="guideme"
    mandatory=false
    versionRange="${guidemeVersionRange}"
    ordering="AFTER"